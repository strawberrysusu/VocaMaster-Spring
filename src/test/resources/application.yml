spring:
  # datasource: ← AbstractIntegrationTest의 @ServiceConnection이 동적 주입 (Testcontainers, ADR-025)

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway가 스키마 관리, JPA는 검증만 (운영과 동일)
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: test-secret-key-minimum-32-characters-long-for-test
  access-expiration: 3600000
  refresh-expiration: 1209600000

server:
  port: 0

auth:
  cookie:
    secure: false
    same-site: Lax
