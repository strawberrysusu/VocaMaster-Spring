spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: test-secret-key-minimum-32-characters-long-for-test
  access-expiration: 3600000
  refresh-expiration: 1209600000

server:
  port: 0

auth:
  cookie:
    secure: false
    same-site: Lax