spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  mustache:
    suffix: .mustache
    charset: UTF-8

jwt:
  expiration: 604800000  # 7일 (밀리초)

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

springdoc:
  swagger-ui:
    path: /api-docs
