spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vocamaster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mustache:
    suffix: .mustache
    charset: UTF-8

jwt:
  secret: vocamaster-dev-secret-key-minimum-32-characters-long
  expiration: 604800000  # 7일 (밀리초)

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

springdoc:
  swagger-ui:
    path: /api-docs
